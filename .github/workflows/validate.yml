name: Validate Skills

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check SKILL.md frontmatter
        run: |
          failed=0
          for file in skills/*/SKILL.md patterns/*/SKILL.md; do
            [ -f "$file" ] || continue

            if ! head -1 "$file" | grep -q "^---$"; then
              echo "FAIL: $file — missing opening --- delimiter"
              failed=1
            fi
            if ! grep -q "^name:" "$file"; then
              echo "FAIL: $file — missing name field"
              failed=1
            fi
            if ! grep -q "^description:" "$file"; then
              echo "FAIL: $file — missing description field"
              failed=1
            fi
            if ! awk 'NR>1 && /^---$/{found=1} END{exit !found}' "$file"; then
              echo "FAIL: $file — missing closing --- delimiter"
              failed=1
            fi

            lines=$(wc -l < "$file")
            if [ "$lines" -gt 500 ]; then
              echo "FAIL: $file — ${lines} lines exceeds 500 line limit"
              failed=1
            fi

            echo "OK: $file (${lines} lines)"
          done
          [ "$failed" -eq 0 ] || exit 1
          echo "All skills valid."

      - name: Check required skill sections
        run: |
          for file in skills/*/SKILL.md; do
            grep -q "^## Purpose" "$file" || echo "WARN: $file missing ## Purpose"
            grep -q "Iron Rule" "$file" || echo "WARN: $file missing Iron Rule"
          done
